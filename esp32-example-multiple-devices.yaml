substitutions:
  name: aesgi-multiple-devices
  device0: aesgi-1
  device1: aesgi-2
  device_description: "Monitor and control two AE Conversion inverters via RS485"
  external_components_source: github://syssi/esphome-aesgi@main
  tx_pin: GPIO16
  rx_pin: GPIO17

esphome:
  name: ${name}
  friendly_name: ${name}
  comment: ${device_description}
  project:
    name: "syssi.esphome-aesgi"
    version: 1.0.0
  devices:
    - id: device0
      name: "${device0}"
    - id: device1
      name: "${device1}"

esp32:
  board: wemos_d1_mini32
  framework:
    type: esp-idf

external_components:
  - source: ${external_components_source}
    refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

ota:
  platform: esphome

logger:

# If you don't use Home Assistant please remove this `api` section and uncomment the `mqtt` component!
api:

# mqtt:
#   broker: !secret mqtt_host
#   username: !secret mqtt_username
#   password: !secret mqtt_password
#   id: mqtt_client

uart:
  - id: uart_0
    baud_rate: 9600
    tx_pin: ${tx_pin}
    rx_pin: ${rx_pin}

aesgi_rs485:
  - id: bus0
    uart_id: uart_0
    rx_timeout: 250ms
    # flow_control_pin: GPIO12

aesgi:
  - id: inverter0
    aesgi_rs485_id: bus0
    address: 29
    update_interval: 5s
  - id: inverter1
    aesgi_rs485_id: bus0
    address: 30
    update_interval: 5s

binary_sensor:
  - platform: aesgi
    aesgi_id: inverter0
    online_status:
      name: "online status"
      device_id: device0
  - platform: aesgi
    aesgi_id: inverter1
    online_status:
      name: "online status"
      device_id: device1

button:
  - platform: aesgi
    aesgi_id: inverter0
    auto_test:
      name: "auto test"
      device_id: device0
    # The operation mode battery can be enabled by setting the battery voltage limit
    operation_mode_pv:
      name: "operation mode pv"
      device_id: device0
  - platform: aesgi
    aesgi_id: inverter1
    auto_test:
      name: "auto test"
      device_id: device1
    # The operation mode battery can be enabled by setting the battery voltage limit
    operation_mode_pv:
